<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Benjax Surf">
<meta name="theme-color" content="#1b1040">
<link rel="manifest" href="manifest.json">
<title>Benjax Surf</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{width:100%;height:100%;overflow:hidden;background:#1b1040;font-family:'Segoe UI',-apple-system,'Helvetica Neue',Arial,sans-serif;color:#fff;}
  #app{position:fixed;inset:0;max-width:480px;margin:0 auto;overflow:hidden;background:#1b1040;}
  canvas#game{position:absolute;inset:0;width:100%;height:100%;z-index:1;touch-action:none;display:none;}

  .screen{position:absolute;inset:0;z-index:3;display:none;flex-direction:column;}
  .screen.on{display:flex;}

  .brand{text-align:center;padding:calc(env(safe-area-inset-top,0px)+24px) 14px 0;}
  .t1{font-weight:900;font-size:15px;letter-spacing:3px;background:linear-gradient(90deg,#ffd700,#ffae00,#fff1a8,#ffd700);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .t2{font-weight:900;font-size:42px;margin-top:4px;letter-spacing:2px;font-style:italic;background:linear-gradient(90deg,#22d3ee,#3b82f6,#a855f7,#22d3ee);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 3px 16px rgba(59,130,246,.6));transform:skewX(-6deg);}

  #homeBody{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:20px;}
  #heroAv{width:150px;height:150px;filter:drop-shadow(0 12px 24px rgba(0,0,0,.5));}
  .bigbtn{padding:20px 56px;border-radius:50px;border:none;font-size:26px;font-weight:900;font-style:italic;color:#fff;cursor:pointer;background:linear-gradient(90deg,#0891b2,#22d3ee);box-shadow:0 8px 28px rgba(34,211,238,.55);letter-spacing:1px;}
  .bigbtn:active{transform:scale(.94);}
  .row{display:flex;gap:12px;}
  .sbtn{padding:14px 26px;border-radius:40px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);font-size:16px;font-weight:900;color:#fff;cursor:pointer;backdrop-filter:blur(6px);display:flex;align-items:center;gap:8px;}
  .sbtn:active{transform:scale(.93);}
  .hint{font-size:13px;color:#a5b4cf;text-align:center;max-width:280px;line-height:1.5;}

  /* HUD */
  #hud{position:absolute;top:0;left:0;right:0;z-index:5;display:none;padding:calc(env(safe-area-inset-top,0px)+10px) 16px 0;justify-content:space-between;align-items:flex-start;pointer-events:none;}
  .hbox{background:rgba(0,0,0,.42);border-radius:14px;padding:7px 13px;backdrop-filter:blur(4px);font-weight:900;font-size:17px;line-height:1.1;}
  .hbox small{font-size:10px;opacity:.7;display:block;font-weight:700;}
  #hRing{color:#ffd700;}
  #hTime{color:#22d3ee;text-align:center;}
  #hSpeed{color:#a855f7;text-align:right;}
  #pauseBtn{pointer-events:auto;width:42px;height:42px;border-radius:12px;background:rgba(0,0,0,.42);border:none;color:#fff;font-size:18px;font-weight:900;cursor:pointer;position:absolute;top:calc(env(safe-area-inset-top,0px)+10px);left:50%;transform:translateX(-50%);display:none;}

  #ov{position:absolute;inset:0;z-index:30;display:none;align-items:center;justify-content:center;background:rgba(10,8,30,.85);backdrop-filter:blur(8px);padding:18px;}
  .card{background:linear-gradient(160deg,rgba(35,40,95,.96),rgba(14,16,46,.96));border:1px solid rgba(34,211,238,.4);border-radius:26px;padding:24px 20px;box-shadow:0 0 50px rgba(34,211,238,.3);max-width:380px;width:100%;text-align:center;}
  .card h2{font-size:28px;font-weight:900;font-style:italic;background:linear-gradient(90deg,#ffd700,#22d3ee,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:8px;}
  .card p{color:#cdd;font-size:15px;line-height:1.6;margin-bottom:14px;}
  .big{font-size:58px;margin-bottom:2px;}
  .obtn{margin:5px 0;padding:15px 22px;border-radius:40px;border:none;font-size:17px;font-weight:900;color:#fff;cursor:pointer;background:linear-gradient(90deg,#0891b2,#22d3ee);box-shadow:0 6px 18px rgba(8,145,178,.5);display:block;width:100%;}
  .obtn.purple{background:linear-gradient(90deg,#7c3aed,#a855f7);}
  .obtn:active{transform:scale(.93);}
  .skinRow{display:flex;gap:10px;justify-content:center;margin:12px 0;flex-wrap:wrap;}
  .skinPick{width:60px;height:60px;border-radius:14px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);cursor:pointer;}
  .skinPick.sel{border-color:#ffd700;box-shadow:0 0 12px rgba(255,215,0,.5);}
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="hbox" id="hRing"><small>ANÉIS</small>0</div>
    <div class="hbox" id="hTime"><small>TEMPO</small>0.0s</div>
    <div class="hbox" id="hSpeed"><small>VELOC.</small>0</div>
  </div>
  <button id="pauseBtn">⏸</button>

  <!-- HOME -->
  <div class="screen on" id="scHome">
    <div class="brand"><div class="t1">LISBOA SOLUTIONS</div><div class="t2">BENJAX SURF</div></div>
    <div id="homeBody">
      <canvas id="heroAv" width="300" height="300"></canvas>
      <button class="bigbtn" id="playBtn">▶ CORRER</button>
      <div class="row">
        <button class="sbtn" id="skinBtn">🎨 Skin</button>
        <button class="sbtn" id="sndBtn">🔊</button>
      </div>
      <div class="hint">Toque pra <b>pular</b> • toque no ar pra <b>pulo duplo</b>. Pegue velocidade nas rampas e voe pelos loops!</div>
    </div>
  </div>

  <div id="ov"><div class="card" id="ovCard"></div></div>
</div>

<script>
"use strict";
/* ===================== BENJAX SURF — runner estilo Sonic ===================== */

/* ---------- estado (em memória, sem localStorage) ---------- */
var equipped=0, soundOn=true;

/* ---------- skins ---------- */
var SKINS=[
  {name:'Turbo',  body:'#22d3ee', head:'#fcd34d', acc:null},
  {name:'Fogo',   body:'#f97316', head:'#fcd34d', acc:'flame'},
  {name:'Roxo',   body:'#a855f7', head:'#fcd34d', acc:null},
  {name:'Verde',  body:'#22c55e', head:'#fcd34d', acc:null},
  {name:'Herói',  body:'#dc2626', head:'#fcd34d', acc:'cape'}
];
function drawAvatar(g,s,idx,t,running){
  t=t||0;g.clearRect(0,0,s,s);
  var sk=SKINS[idx]||SKINS[0];var cx=s/2,bob=Math.sin(t*.012)*s*.012;
  var lean=running?s*.03:0;
  // capa
  if(sk.acc==='cape'){g.fillStyle='#b91c1c';g.beginPath();g.moveTo(cx-s*.16-lean,s*.42+bob);g.quadraticCurveTo(cx-lean*2,s*.8,cx+s*.14-lean,s*.42+bob);g.lineTo(cx+s*.08,s*.4);g.lineTo(cx-s*.1,s*.4);g.fill();}
  // pernas (correndo: alternadas)
  g.fillStyle='#1e3a8a';
  var leg=running?Math.sin(t*.03)*s*.04:0;
  g.fillRect(cx-s*.1+lean,s*.55+bob,s*.07,s*.16-Math.abs(leg));
  g.fillRect(cx+s*.03+lean,s*.55+bob,s*.07,s*.16-Math.abs(-leg));
  // corpo
  g.fillStyle=sk.body;g.beginPath();g.roundRect(cx-s*.14+lean,s*.36+bob,s*.28,s*.22,s*.06);g.fill();
  g.fillStyle='rgba(255,255,255,.25)';g.beginPath();g.roundRect(cx-s*.14+lean,s*.36+bob,s*.28,s*.07,s*.06);g.fill();
  // bracos
  g.fillStyle=sk.head;g.fillRect(cx-s*.2+lean,s*.38+bob,s*.06,s*.15);g.fillRect(cx+s*.14+lean,s*.38+bob,s*.06,s*.15);
  // cabeca
  g.fillStyle=sk.head;g.beginPath();g.roundRect(cx-s*.13+lean,s*.13+bob,s*.26,s*.24,s*.08);g.fill();
  // olhos (estilo cartoon grande)
  g.fillStyle='#fff';g.beginPath();g.ellipse(cx-s*.04+lean,s*.23+bob,s*.045,s*.06,0,0,6.3);g.fill();g.beginPath();g.ellipse(cx+s*.06+lean,s*.23+bob,s*.045,s*.06,0,0,6.3);g.fill();
  g.fillStyle='#111';g.beginPath();g.arc(cx-s*.025+lean,s*.24+bob,s*.022,0,6.3);g.fill();g.beginPath();g.arc(cx+s*.075+lean,s*.24+bob,s*.022,0,6.3);g.fill();
  // sorriso
  g.strokeStyle='#111';g.lineWidth=s*.016;g.beginPath();g.arc(cx+s*.01+lean,s*.3+bob,s*.04,.15,2.99);g.stroke();
  // acessorios
  if(sk.acc==='flame'){g.fillStyle='#fb923c';for(var i=-1;i<2;i++){g.beginPath();g.moveTo(cx+i*s*.06+lean,s*.13+bob);g.quadraticCurveTo(cx+i*s*.06-s*.02+lean,s*.04+bob,cx+i*s*.06+lean,s*.01+bob);g.quadraticCurveTo(cx+i*s*.06+s*.02+lean,s*.04+bob,cx+i*s*.06+lean,s*.13+bob);g.fill();}}
}

/* ---------- audio ---------- */
var AC=null;
function actx(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(AC&&AC.state==='suspended')AC.resume();return AC;}
function tone(f,d,type,v,when){if(!soundOn)return;var a=actx();if(!a)return;var o=a.createOscillator(),g=a.createGain();o.type=type||'sine';o.frequency.value=f;var ts=a.currentTime+(when||0);g.gain.setValueAtTime(v||.15,ts);g.gain.exponentialRampToValueAtTime(.001,ts+d);o.connect(g);g.connect(a.destination);o.start(ts);o.stop(ts+d);}
var SFX={
  jump:function(){tone(500,.1,'square',.13);tone(760,.08,'square',.11,.05);},
  ring:function(){tone(1175,.05,'sine',.16);tone(1568,.1,'sine',.14,.05);},
  boost:function(){tone(400,.05,'sawtooth',.12);tone(700,.05,'sawtooth',.12,.04);tone(1000,.08,'sawtooth',.12,.08);},
  die:function(){tone(330,.4,'sawtooth',.15);tone(160,.5,'sawtooth',.13,.1);},
  win:function(){[523,659,784,1047,1319].forEach(function(f,i){tone(f,.16,'triangle',.16,i*.07);});},
  tap:function(){tone(600,.05,'square',.1);}
};

/* ---------- canvas ---------- */
var cv=document.getElementById('game'),gx=cv.getContext('2d'),W,H,DPR;
function resize(){DPR=Math.min(window.devicePixelRatio||1,2);var r=document.getElementById('app').getBoundingClientRect();W=r.width;H=r.height;cv.width=W*DPR;cv.height=H*DPR;gx.setTransform(DPR,0,0,DPR,0,0);}
window.addEventListener('resize',resize);
if(!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){if(typeof r==='number')r={tl:r,tr:r,br:r,bl:r};this.beginPath();this.moveTo(x+r.tl,y);this.lineTo(x+w-r.tr,y);this.quadraticCurveTo(x+w,y,x+w,y+r.tr);this.lineTo(x+w,y+h-r.br);this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);this.lineTo(x+r.bl,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r.bl);this.lineTo(x,y+r.tl);this.quadraticCurveTo(x,y,x+r.tl,y);this.closePath();return this;};}

function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');});document.getElementById(id).classList.add('on');}
function ov(html){document.getElementById('ovCard').innerHTML=html;document.getElementById('ov').style.display='flex';}
function ovClose(){document.getElementById('ov').style.display='none';}

/* ===================== JOGO ===================== */
/* terreno contínuo gerado por altura (colinas suaves estilo Sonic),
   rampas que dão boost, anéis pra coletar, espinhos. Cronômetro conta
   o tempo de sobrevivência. Velocidade sobe quanto mais corre. */
var G={run:false,raf:null,rings:0,time:0,paused:false};
var player,scrollX,baseSpeed,speed,gravity,heroT,lastTs;
var ground=[],rings=[],spikes=[],boosts=[],particles=[];
var SEG=24; // largura de cada segmento de terreno

function terrainY(worldX){
  // soma de senos => colinas suaves e variadas
  return H*0.62
    + Math.sin(worldX*0.0016)*60
    + Math.sin(worldX*0.0041+1.3)*32
    + Math.sin(worldX*0.011+0.6)*14;
}

function startRun(){
  actx();
  show('scHome');document.getElementById('scHome').classList.remove('on');
  cv.style.display='block';
  document.getElementById('hud').style.display='flex';
  document.getElementById('pauseBtn').style.display='block';
  resize();
  // reset COMPLETO (corrige o bug de reiniciar)
  if(G.raf){cancelAnimationFrame(G.raf);G.raf=null;}
  rings=[];spikes=[];boosts=[];particles=[];
  scrollX=0;baseSpeed=4.5;speed=baseSpeed;gravity=0.78;heroT=0;
  G.run=true;G.rings=0;G.time=0;G.paused=false;
  lastTs=performance.now();
  player={x:W*0.26,y:terrainY(W*0.26)-60,vy:0,r:22,onGround:false};
  genWorld=0;genUntil(scrollX+W*2);
  document.getElementById('hRing').innerHTML='<small>ANÉIS</small>0';
  document.getElementById('hTime').innerHTML='<small>TEMPO</small>0.0s';
  document.getElementById('hSpeed').innerHTML='<small>VELOC.</small>0';
  document.getElementById('pauseBtn').textContent='⏸';
  cv.ontouchstart=function(e){e.preventDefault();jump();};
  cv.onmousedown=function(){jump();};
  G.raf=requestAnimationFrame(loop);
}
var genWorld=0;
function genUntil(targetX){
  while(genWorld<targetX){
    genWorld+=SEG;
    var gy=terrainY(genWorld);
    // anéis flutuando seguindo o terreno
    if(Math.random()<0.35){rings.push({x:genWorld,y:gy-70-Math.random()*40,got:false});}
    // boost (rampa) ocasional
    if(Math.random()<0.05&&G.time>3){boosts.push({x:genWorld,y:gy,used:false});}
    // espinho ocasional (depois de um tempo)
    if(Math.random()<0.06&&G.time>5){spikes.push({x:genWorld,y:gy});}
  }
}
function jump(){
  if(!G.run||G.paused)return;
  if(player.onGround){player.vy=-14.5;player.onGround=false;player.jumps=1;SFX.jump();}
  else if(player.jumps<2){player.vy=-12;player.jumps=2;SFX.jump();spawnParticles(player.x,player.y+player.r,'#22d3ee',8);}
}
function spawnParticles(x,y,c,n){for(var i=0;i<n;i++){var a=Math.random()*6.3,sp=Math.random()*3+1;particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,c:c,r:Math.random()*3+1.5});}}

function loop(now){
  if(!G.run)return;
  var dt=Math.min(40,now-lastTs);lastTs=now;heroT+=dt;
  if(!G.paused)update(dt);
  draw();
  G.raf=requestAnimationFrame(loop);
}
function update(dt){
  G.time+=dt/1000;
  document.getElementById('hTime').innerHTML='<small>TEMPO</small>'+G.time.toFixed(1)+'s';
  speed=baseSpeed+G.time*0.12; if(speed>14)speed=14;
  // decai boost extra
  if(player.boost>0){player.boost-=dt/1000;}
  var realSpeed=speed+(player.boost>0?6:0);
  scrollX+=realSpeed*(dt/16);
  document.getElementById('hSpeed').innerHTML='<small>VELOC.</small>'+Math.round(realSpeed*10);
  genUntil(scrollX+W*2);
  // física vertical
  player.vy+=gravity*(dt/16);player.y+=player.vy*(dt/16);
  var gyHere=terrainY(scrollX+player.x);
  if(player.y+player.r>=gyHere){
    player.y=gyHere-player.r;
    if(player.vy>0){player.vy=0;}
    player.onGround=true;player.jumps=0;
  } else {player.onGround=false;}
  // trilha de velocidade
  if(realSpeed>9&&Math.random()<.5)spawnParticles(player.x-10,player.y,'rgba(34,211,238,.6)',1);
  // anéis
  for(var i=0;i<rings.length;i++){var r=rings[i];if(r.got)continue;var rx=r.x-scrollX;if(rx<-30)continue;
    if(Math.abs(rx-player.x)<24&&Math.abs(r.y-player.y)<28){r.got=true;G.rings++;SFX.ring();spawnParticles(rx,r.y,'#ffd700',6);document.getElementById('hRing').innerHTML='<small>ANÉIS</small>'+G.rings;}}
  // boosts
  for(var i=0;i<boosts.length;i++){var b=boosts[i];if(b.used)continue;var bx=b.x-scrollX;if(bx<-30)continue;
    if(Math.abs(bx-player.x)<26&&player.y+player.r>b.y-30){b.used=true;player.boost=1.2;player.vy=-9;SFX.boost();spawnParticles(bx,b.y,'#a855f7',12);}}
  // espinhos
  for(var i=0;i<spikes.length;i++){var s=spikes[i];var sx=s.x-scrollX;if(sx<-30)continue;
    if(Math.abs(sx-player.x)<20&&player.y+player.r>s.y-16&&player.onGround){return die();}}
  // partículas
  for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=.03;if(p.life<=0)particles.splice(i,1);}
  // limpa
  if(rings.length>80)rings.splice(0,rings.length-80);
  if(spikes.length>30)spikes.splice(0,spikes.length-30);
  if(boosts.length>15)boosts.splice(0,boosts.length-15);
}
function draw(){
  // céu gradiente
  var sky=gx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#3b1d6e');sky.addColorStop(.5,'#5b21b6');sky.addColorStop(1,'#1b1040');gx.fillStyle=sky;gx.fillRect(0,0,W,H);
  // sol
  var sun=gx.createRadialGradient(W*.72,H*.2,10,W*.72,H*.2,90);sun.addColorStop(0,'#fde68a');sun.addColorStop(.5,'rgba(251,191,36,.5)');sun.addColorStop(1,'transparent');gx.fillStyle=sun;gx.fillRect(W*.4,0,W*.6,H*.5);
  // nuvens/colinas distantes parallax
  gx.fillStyle='rgba(168,85,247,.25)';for(var i=0;i<4;i++){var mx=((i*260-scrollX*0.25)%(W+260)+W+260)%(W+260)-130;gx.beginPath();gx.arc(mx,H*.55,120,Math.PI,0);gx.fill();}
  gx.fillStyle='rgba(99,102,241,.3)';for(var i=0;i<5;i++){var mx=((i*200-scrollX*0.45)%(W+200)+W+200)%(W+200)-100;gx.beginPath();gx.arc(mx,H*.62,90,Math.PI,0);gx.fill();}

  // TERRENO (preenchido)
  gx.beginPath();gx.moveTo(0,H);
  for(var px=0;px<=W;px+=8){var gy=terrainY(scrollX+px);gx.lineTo(px,gy);}
  gx.lineTo(W,H);gx.closePath();
  var tg=gx.createLinearGradient(0,H*.5,0,H);tg.addColorStop(0,'#22c55e');tg.addColorStop(.15,'#16a34a');tg.addColorStop(1,'#064e3b');gx.fillStyle=tg;gx.fill();
  // borda clara do terreno
  gx.beginPath();for(var px=0;px<=W;px+=8){var gy=terrainY(scrollX+px);if(px===0)gx.moveTo(px,gy);else gx.lineTo(px,gy);}
  gx.strokeStyle='rgba(255,255,255,.35)';gx.lineWidth=3;gx.stroke();

  // boosts (rampas)
  for(var i=0;i<boosts.length;i++){var b=boosts[i];if(b.used)continue;var bx=b.x-scrollX;if(bx>W+30||bx<-30)continue;
    gx.fillStyle='#a855f7';gx.beginPath();gx.moveTo(bx-18,b.y);gx.lineTo(bx+18,b.y);gx.lineTo(bx+18,b.y-34);gx.closePath();gx.fill();
    gx.fillStyle='#fff';gx.font='900 16px Segoe UI';gx.textAlign='center';gx.fillText('»',bx+4,b.y-12);}
  // espinhos
  for(var i=0;i<spikes.length;i++){var s=spikes[i];var sx=s.x-scrollX;if(sx>W+30||sx<-30)continue;
    gx.fillStyle='#ef4444';for(var k=-1;k<2;k++){gx.beginPath();gx.moveTo(sx+k*10,s.y);gx.lineTo(sx+k*10+5,s.y-18);gx.lineTo(sx+k*10+10,s.y);gx.fill();}}
  // anéis (estilo Sonic: anel dourado giratório)
  for(var i=0;i<rings.length;i++){var r=rings[i];if(r.got)continue;var rx=r.x-scrollX;if(rx>W+30||rx<-30)continue;
    var wob=Math.abs(Math.sin(heroT*.006+i))*0.7+0.3; // gira
    gx.save();gx.shadowColor='#fde047';gx.shadowBlur=14;gx.strokeStyle='#fbbf24';gx.lineWidth=5;gx.beginPath();gx.ellipse(rx,r.y,11*wob,11,0,0,6.3);gx.stroke();gx.strokeStyle='#fef3c7';gx.lineWidth=2;gx.beginPath();gx.ellipse(rx,r.y,11*wob,11,0,0,6.3);gx.stroke();gx.restore();}
  // partículas
  for(var i=0;i<particles.length;i++){var p=particles[i];gx.globalAlpha=Math.max(0,p.life);gx.fillStyle=p.c;gx.beginPath();gx.arc(p.x,p.y,p.r,0,6.3);gx.fill();}gx.globalAlpha=1;

  // sombra do jogador
  var gyP=terrainY(scrollX+player.x);gx.globalAlpha=.25;gx.fillStyle='#000';gx.beginPath();gx.ellipse(player.x,gyP,18,5,0,0,6.3);gx.fill();gx.globalAlpha=1;
  // jogador (avatar — SEM fundo/quadrado preto: drawAvatar usa clearRect e desenha direto)
  gx.save();gx.translate(player.x-35,player.y-42);
  drawAvatar(gx,70,equipped,heroT,true);
  gx.restore();
}
function die(){
  if(!G.run)return;G.run=false;SFX.die();
  if(G.raf){cancelAnimationFrame(G.raf);G.raf=null;}
  cv.ontouchstart=cv.onmousedown=null;
  document.getElementById('pauseBtn').style.display='none';
  setTimeout(function(){
    ov('<div class="big">💫</div><h2>Acabou!</h2>'+
       '<p>Você surfou por <b style="color:#22d3ee">'+G.time.toFixed(1)+' segundos</b><br>Anéis: <b style="color:#ffd700">'+G.rings+'</b></p>'+
       '<button class="obtn" id="againB">▶ Correr de novo</button>'+
       '<button class="obtn purple" id="homeB">Início</button>');
    document.getElementById('againB').onclick=function(){ovClose();startRun();};
    document.getElementById('homeB').onclick=function(){ovClose();goHome();};
  },450);
}
function goHome(){G.run=false;if(G.raf){cancelAnimationFrame(G.raf);G.raf=null;}cv.style.display='none';document.getElementById('hud').style.display='none';document.getElementById('pauseBtn').style.display='none';show('scHome');}

document.getElementById('pauseBtn').onclick=function(){
  if(!G.run)return;G.paused=!G.paused;document.getElementById('pauseBtn').textContent=G.paused?'▶':'⏸';
  if(G.paused){ov('<div class="big">⏸</div><h2>Pausado</h2><button class="obtn" id="resumeB">Continuar</button><button class="obtn purple" id="quitB">Sair</button>');
    document.getElementById('resumeB').onclick=function(){ovClose();G.paused=false;document.getElementById('pauseBtn').textContent='⏸';lastTs=performance.now();};
    document.getElementById('quitB').onclick=function(){ovClose();goHome();};}
};

/* ===================== SKIN PICKER ===================== */
function openSkins(){
  var html='<h2>🎨 Escolha o estilo</h2><div class="skinRow" id="skinRow"></div><button class="obtn" id="skinClose">Pronto</button>';
  ov(html);
  var row=document.getElementById('skinRow');
  SKINS.forEach(function(sk,i){var c=document.createElement('canvas');c.width=60;c.height=60;c.className='skinPick'+(i===equipped?' sel':'');drawAvatar(c.getContext('2d'),60,i,0,false);c.onclick=function(){equipped=i;SFX.tap();openSkins();};row.appendChild(c);});
  document.getElementById('skinClose').onclick=ovClose;
}

/* ===================== HOME ===================== */
var heroCv=document.getElementById('heroAv'),heroGx=heroCv.getContext('2d');
function heroLoop(t){if(document.getElementById('scHome').classList.contains('on'))drawAvatar(heroGx,300,equipped,t,false);requestAnimationFrame(heroLoop);}

document.getElementById('playBtn').onclick=function(){SFX.tap();startRun();};
document.getElementById('skinBtn').onclick=function(){SFX.tap();openSkins();};
document.getElementById('sndBtn').onclick=function(){soundOn=!soundOn;document.getElementById('sndBtn').textContent=soundOn?'🔊':'🔇';if(soundOn){actx();SFX.tap();}};

resize();heroLoop(0);
document.body.addEventListener('touchstart',function(){actx();},{once:true});
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
