<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }

  .ans:active { transform:scale(.93); }

  #overlay h2 { font-size:30px; font-weight:900; background:linear-gradient(90deg,#ffd700,#a855f7,#22c55e); -webkit-background-clip:text; background-clip:text; color:transparent; margin-bottom:8px; }

<script>
(function(){
"use strict";

// roundRect polyfill (Safari antigo)
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number') r={tl:r,tr:r,br:r,bl:r}; else r=r||{tl:0,tr:0,br:0,bl:0};
    this.beginPath();
    this.moveTo(x+r.tl,y);
    this.lineTo(x+w-r.tr,y); this.quadraticCurveTo(x+w,y,x+w,y+r.tr);
    this.lineTo(x+w,y+h-r.br); this.quadraticCurveTo(x+w,y+h,x+w-r.br,y+h);
    this.lineTo(x+r.bl,y+h); this.quadraticCurveTo(x,y+h,x,y+h-r.bl);
    this.lineTo(x,y+r.tl); this.quadraticCurveTo(x,y,x+r.tl,y);
    this.closePath(); return this;
  };
}

/* ===== ESTADO ===== */
var state = { coins:0, combo:1, level:1, hits:0, maxLevel:20 };
var COLORS = ['#a855f7','#3b82f6','#22c55e','#fb923c','#ec4899'];
var GLOW   = ['#c084fc','#60a5fa','#4ade80','#fdba74','#f9a8d4'];

/* ===== CANVAS ===== */
var bgC=document.getElementById('bg'), bx=bgC.getContext('2d');
var gC=document.getElementById('game'), gx=gC.getContext('2d');
var W,H,DPR;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  var r=document.getElementById('wrap').getBoundingClientRect();
  W=r.width; H=r.height;
  [bgC,gC].forEach(function(c){ c.width=W*DPR; c.height=H*DPR; });
  bx.setTransform(DPR,0,0,DPR,0,0); gx.setTransform(DPR,0,0,DPR,0,0);
  buildStars(); layoutGrid();
}
window.addEventListener('resize',resize);

/* ===== FUNDO ESPACIAL ===== */
var stars=[], nebulas=[];
function buildStars(){
  stars=[]; for(var i=0;i<90;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.6+.3,t:Math.random()*6.28,sp:Math.random()*2+.5});
  nebulas=[
    {x:W*.2,y:H*.25,r:W*.5,c:'rgba(120,40,180,.18)'},
    {x:W*.85,y:H*.4,r:W*.45,c:'rgba(40,90,200,.16)'},
    {x:W*.5,y:H*.7,r:W*.55,c:'rgba(30,160,120,.12)'}
  ];
}
function drawBG(t){
  bx.clearRect(0,0,W,H);
  bx.fillStyle='#0a0a1a'; bx.fillRect(0,0,W,H);
  for(var n=0;n<nebulas.length;n++){var nb=nebulas[n];var g=bx.createRadialGradient(nb.x,nb.y,0,nb.x,nb.y,nb.r);g.addColorStop(0,nb.c);g.addColorStop(1,'transparent');bx.fillStyle=g;bx.fillRect(0,0,W,H);}
  for(var i=0;i<stars.length;i++){var s=stars[i];var a=.4+.6*Math.abs(Math.sin(t*.001*s.sp+s.t));bx.globalAlpha=a;bx.fillStyle='#fff';bx.beginPath();bx.arc(s.x,s.y,s.r,0,6.28);bx.fill();}
  bx.globalAlpha=1;
}

/* ===== GRADE DE BOLHAS (decorativa, alvo do tiro) ===== */
var grid=[], gridRows=4, gridCols=7, bR=0, gridTop=0, gridLeft=0, gap=0;
function layoutGrid(){
  gridTop = H*0.20;
  var avail = W-24;
  gap = 4;
  bR = Math.min((avail/(gridCols))/2 - gap, 26);
  if(bR<16) bR=16;
  gridLeft = (W - (gridCols*(bR*2+gap)-gap))/2 + bR;
  grid=[];
  for(var r=0;r<gridRows;r++) for(var c=0;c<gridCols;c++){
    grid.push({ x:gridLeft+c*(bR*2+gap), y:gridTop+r*(bR*2+gap), col:Math.floor(Math.random()*COLORS.length), alive:true, pop:0 });
  }
}
function refillGrid(){ for(var i=0;i<grid.length;i++){grid[i].alive=true;grid[i].pop=0;grid[i].col=Math.floor(Math.random()*COLORS.length);} }

/* ===== PARTÍCULAS & PROJÉTIL ===== */
var particles=[], shots=[];
function burst(x,y,color){ for(var i=0;i<18;i++){var a=Math.random()*6.28,sp=Math.random()*4+1.5;particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,c:color,r:Math.random()*4+2});} }
function fireShot(color,targetIdx,onHit){
  shots.push({x:W/2,y:H-shooterY(),tx:0,ty:0,color:color,t:0,idx:targetIdx,cb:onHit,started:false});
}
function shooterY(){ return (document.getElementById('qbar').getBoundingClientRect().height)+40; }

/* ===== AVATAR ROBLOX (atirador) ===== */
function drawShooter(t){
  var sx=W/2, sy=H-shooterY();
  gx.save();
  gx.translate(sx,sy);
  var bob=Math.sin(t*.003)*2;
  // sombra
  gx.globalAlpha=.3; gx.fillStyle='#000'; gx.beginPath(); gx.ellipse(0,18,16,5,0,0,6.28); gx.fill(); gx.globalAlpha=1;
  // pernas
  gx.fillStyle='#1e3a8a'; gx.fillRect(-9,4+bob,7,14); gx.fillRect(2,4+bob,7,14);
  // corpo
  gx.fillStyle='#22c55e'; gx.beginPath(); gx.roundRect(-12,-10+bob,24,18,5); gx.fill();
  // braços
  gx.fillStyle='#fcd34d'; gx.fillRect(-17,-8+bob,5,14); gx.fillRect(12,-8+bob,5,14);
  // cabeça
  gx.fillStyle='#fcd34d'; gx.beginPath(); gx.roundRect(-11,-30+bob,22,20,6); gx.fill();
  // olhos
  gx.fillStyle='#111'; gx.fillRect(-6,-22+bob,3,4); gx.fillRect(3,-22+bob,3,4);
  // sorriso
  gx.strokeStyle='#111'; gx.lineWidth=2; gx.beginPath(); gx.arc(0,-18+bob,4,.1,3.04); gx.stroke();
  gx.restore();
}

/* ===== BOLHA DESENHO ===== */
function drawBubble(x,y,r,colIdx,scale){
  scale=scale||1; r=r*scale;
  var c=COLORS[colIdx], gl=GLOW[colIdx];
  gx.save();
  gx.shadowColor=gl; gx.shadowBlur=16;
  var g=gx.createRadialGradient(x-r*.3,y-r*.3,r*.1,x,y,r);
  g.addColorStop(0,gl); g.addColorStop(.6,c); g.addColorStop(1,c);
  gx.fillStyle=g; gx.beginPath(); gx.arc(x,y,r,0,6.28); gx.fill();
  gx.shadowBlur=0;
  gx.globalAlpha=.5; gx.fillStyle='#fff'; gx.beginPath(); gx.arc(x-r*.32,y-r*.32,r*.28,0,6.28); gx.fill();
  gx.globalAlpha=1; gx.restore();
}

/* ===== LOOP ===== */
var last=0;
function loop(t){
  drawBG(t);
  gx.clearRect(0,0,W,H);
  // grade
  for(var i=0;i<grid.length;i++){var b=grid[i];
    if(b.alive){ drawBubble(b.x,b.y,bR,b.col,1); }
    else if(b.pop>0){ b.pop-=0.06; if(b.pop>0) drawBubble(b.x,b.y,bR,b.col,b.pop); }
  }
  // projéteis
  for(var s=shots.length-1;s>=0;s--){var sh=shots[s]; sh.t+=0.06;
    var tg = grid[sh.idx]||{x:W/2,y:gridTop};
    var px=W/2+(tg.x-W/2)*sh.t, py=(H-shooterY())+(tg.y-(H-shooterY()))*sh.t;
    drawBubble(px,py,bR*.8,COLORS.indexOf(sh.color)>=0?COLORS.indexOf(sh.color):0,1);
    if(sh.t>=1){ if(sh.cb) sh.cb(tg.x,tg.y); shots.splice(s,1); }
  }
  // partículas
  for(var p=particles.length-1;p>=0;p--){var pa=particles[p];pa.x+=pa.vx;pa.y+=pa.vy;pa.vy+=.15;pa.life-=.03;
    if(pa.life<=0){particles.splice(p,1);continue;}
    gx.globalAlpha=pa.life;gx.fillStyle=pa.c;gx.beginPath();gx.arc(pa.x,pa.y,pa.r,0,6.28);gx.fill();gx.globalAlpha=1;}
  drawShooter(t);
  requestAnimationFrame(loop);
}

/* ===== SONS (Web Audio) ===== */
var AC=null;
function actx(){ if(!AC){ AC=new (window.AudioContext||window.webkitAudioContext)(); } if(AC.state==='suspended') AC.resume(); return AC; }
function tone(freq,dur,type,vol,when){ var a=actx();var o=a.createOscillator(),g=a.createGain();o.type=type||'sine';o.frequency.value=freq;var ts=a.currentTime+(when||0);g.gain.setValueAtTime(vol||.2,ts);g.gain.exponentialRampToValueAtTime(.001,ts+dur);o.connect(g);g.connect(a.destination);o.start(ts);o.stop(ts+dur);}
function sPop(){ var a=actx();var o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.setValueAtTime(700,a.currentTime);o.frequency.exponentialRampToValueAtTime(180,a.currentTime+.12);g.gain.setValueAtTime(.3,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.14);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+.14);}
function sRight(){ [523,659,784].forEach(function(f,i){tone(f,.18,'triangle',.22,i*.07);}); }
function sWrong(){ var a=actx();var o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.setValueAtTime(300,a.currentTime);o.frequency.exponentialRampToValueAtTime(90,a.currentTime+.4);g.gain.setValueAtTime(.22,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.42);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+.42);}
function sCoin(){ tone(988,.08,'square',.18); tone(1319,.12,'square',.18,.06); }
function sCombo(){ [523,659,784,1047].forEach(function(f,i){tone(f,.15,'square',.18,i*.06);}); }
function sLevel(){ [392,523,659,784,1047,1319].forEach(function(f,i){tone(f,.22,'triangle',.22,i*.1);}); }

17:[{q:'PA: 1,4,7... 6º termo',a:16,o:[15,17,13]},{q:'4x+2=18, x=',a:4,o:[5,3,16]},{q:'Faces de um dado',a:6,o:[4,8,12]},{q:'PG: 2,4,8,16... 5º termo',a:32,o:[24,30,64]},{q:'x/3 = 6, x =',a:18,o:[2,9,12]}],

20:[{q:"∫ entende área sob a curva? Derivada de x³",a:'3x²',o:['x²','3x','2x²']},{q:'Próx: 2,6,12,20,30,?',a:42,o:[40,44,36]},{q:'2⁰',a:1,o:[0,2,'∞']},{q:'Próx: 1,4,9,16,?',a:25,o:[20,24,36]},{q:'lim x→0 de x',a:0,o:[1,'∞','-1']}]

/* ===== JOGO ===== */
var current=null;
function pickQuestion(){
  var lvl=state.level; var pool=BANK[lvl]||BANK[20];
  var item=pool[Math.floor(Math.random()*pool.length)];
  var opts=[item.a].concat(item.o);
  // embaralhar
  for(var i=opts.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=opts[i];opts[i]=opts[j];opts[j]=tmp;}
  current={q:item.q,a:item.a,opts:opts};
  renderQuestion();
}
function renderQuestion(){
  document.getElementById('question').textContent=current.q+' = ?';
  var box=document.getElementById('answers'); box.innerHTML='';
  current.opts.forEach(function(val,i){
    var b=document.createElement('button');
    b.className='ans a'+(i%4); b.textContent=val;
    b.onclick=function(){ answer(val,b); };
    box.appendChild(b);
  });
}
function coinValue(){ return Math.round((state.level*7+ (state.level>=10?20:0)) ); } // ~ nivel1=7... cresce
function answer(val,btn){
  actx();
  if(val===current.a){
    var aliveIdx=[]; for(var i=0;i<grid.length;i++) if(grid[i].alive) aliveIdx.push(i);
    var idx=aliveIdx.length?aliveIdx[Math.floor(Math.random()*aliveIdx.length)]:0;
    sRight();
    var colIdx=grid[idx]?grid[idx].col:0;
    fireShot(COLORS[colIdx],idx,function(x,y){
      if(grid[idx]){grid[idx].alive=false;grid[idx].pop=1;}
      burst(x,y,GLOW[colIdx]); sPop(); sCoin();
      var gain = (5 + Math.round((state.level-1)*(145/19))) * state.combo;
      state.coins+=gain; floatText('+'+gain+' B$',x,y,'#ffd700');
      state.combo=Math.min(10,state.combo+1);
      if(state.combo>=5) sCombo();
      state.hits++;
      if(state.hits%4===0) levelUp(); else { updateHUD(); pickQuestion(); }
      // recarregar grade se acabou
      var anyAlive=grid.some(function(b){return b.alive;});
      if(!anyAlive) setTimeout(refillGrid,400);
    });
  } else {
    sWrong(); state.combo=1; updateHUD();
    btn.style.background='linear-gradient(90deg,#7f1d1d,#dc2626)';
    floatText('Ops!',W/2,H*0.5,'#ef4444');
    setTimeout(function(){ pickQuestion(); },600);
  }
}
function floatText(txt,x,y,color){
  var t=document.getElementById('toast'); var el=document.createElement('div');
  el.className='float'; el.textContent=txt; el.style.color=color;
  el.style.left=(x-document.getElementById('wrap').getBoundingClientRect().left)+'px';
  el.style.top=y+'px';
  t.appendChild(el); setTimeout(function(){ el.remove(); },1000);
}
function updateHUD(){
  document.getElementById('coins').textContent=state.coins;
  document.getElementById('combo').textContent=state.combo;
  document.getElementById('level').textContent=state.level;
}
function levelUp(){
  if(state.level>=state.maxLevel){ winGame(); return; }
  var bonus=state.level*15;
  state.coins+=bonus; state.level++; updateHUD();
  sLevel(); confetti();
  showOverlay('<div class="big">🎉</div><h2>Nível '+state.level+'!</h2>'+
    '<p>Parabéns Benjamin!<br>Bônus de nível: <b style="color:#ffd700">+'+bonus+' B$</b></p>'+
    '<button class="obtn green" id="contBtn">Continuar ▶</button>');
  document.getElementById('contBtn').onclick=function(){ hideOverlay(); refillGrid(); pickQuestion(); };
}
function winGame(){
  confetti(); sLevel();
  showOverlay('<div class="big">🏆</div><h2>CAMPEÃO!</h2>'+
    '<p>Benjamin Lisboa zerou o Benjax Bubble Math!<br>Total: <b style="color:#ffd700">'+state.coins+' B$</b></p>'+
    '<button class="obtn" id="againBtn">Jogar de novo ↺</button>');
  document.getElementById('againBtn').onclick=function(){ hideOverlay(); resetGame(); };
}
function confetti(){
  for(var i=0;i<60;i++){ particles.push({x:Math.random()*W,y:-10,vx:(Math.random()-.5)*4,vy:Math.random()*3+2,life:1.5,c:GLOW[Math.floor(Math.random()*GLOW.length)],r:Math.random()*5+2}); }
}

/* ===== DICA ===== */
document.getElementById('hintBtn').onclick=function(){
  if(state.coins<3){ floatText('Sem moedas!',W/2,H*0.5,'#ef4444'); return; }
  state.coins-=3; updateHUD();
  var btns=document.querySelectorAll('.ans');
  btns.forEach(function(b){ if(parseFloat(b.textContent)!=current.a && b.textContent!=String(current.a)){ b.style.opacity='.25'; } });
  // elimina 2 errados
  var wrong=[]; btns.forEach(function(b){ if(b.textContent!=String(current.a)) wrong.push(b); });
  // mostra só remoção de 2
  var keep=0; wrong.forEach(function(b){ keep++; if(keep>2) b.style.opacity='1'; });
  sCoin();
};

/* ===== RESET ===== */
document.getElementById('resetBtn').onclick=function(){
  showOverlay('<h2>Reiniciar?</h2><p>Você vai perder o progresso atual.</p>'+
    '<button class="obtn red" id="yesR">Sim, reiniciar</button>'+
    '<button class="obtn" id="noR">Cancelar</button>');
  document.getElementById('yesR').onclick=function(){ hideOverlay(); resetGame(); };
  document.getElementById('noR').onclick=hideOverlay;
};
function resetGame(){ state={coins:0,combo:1,level:1,hits:0,maxLevel:20}; refillGrid(); updateHUD(); pickQuestion(); }

/* ===== OVERLAY ===== */
function showOverlay(html){ document.getElementById('ovCard').innerHTML=html; document.getElementById('overlay').style.display='flex'; }
function hideOverlay(){ document.getElementById('overlay').style.display='none'; }

/* ===== INIT ===== */
resize(); updateHUD(); pickQuestion(); requestAnimationFrame(loop);
document.body.addEventListener('touchstart',function(){actx();},{once:true});

/* Service Worker */
if('serviceWorker' in navigator){ window.addEventListener('load',function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }

})();
