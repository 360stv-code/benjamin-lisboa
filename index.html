<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Benjax Arcade">
<meta name="theme-color" content="#0a0a1a">
<link rel="manifest" href="manifest.json">
<title>Benjax Arcade</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none;}
  html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:'Segoe UI',-apple-system,'Helvetica Neue',Arial,sans-serif;color:#fff;}
  #app{position:fixed;inset:0;max-width:480px;margin:0 auto;background:#0a0a1a;overflow:hidden;}
  canvas#bg{position:absolute;inset:0;width:100%;height:100%;z-index:0;}
  .screen{position:absolute;inset:0;z-index:2;display:none;flex-direction:column;}
  .screen.on{display:flex;}
  .pad{padding:calc(env(safe-area-inset-top,0px) + 10px) 14px calc(env(safe-area-inset-bottom,0px) + 14px);}

  /* ---- topo ---- */
  .brand{text-align:center;}
  .brand .t1{font-weight:900;font-size:18px;letter-spacing:1px;background:linear-gradient(90deg,#ffd700,#ffae00,#fff1a8,#ffd700);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 14px rgba(255,200,0,.3);}
  .brand .t2{font-weight:800;font-size:26px;margin-top:2px;background:linear-gradient(90deg,#a855f7,#22c55e,#60a5fa,#a855f7);-webkit-background-clip:text;background-clip:text;color:transparent;}

  /* ---- perfil bar ---- */
  #pbar{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;}
  .avatar{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 14px rgba(0,0,0,.4);}
  #pname{font-weight:900;font-size:16px;}
  #pcoins{font-weight:900;color:#ffd700;font-size:15px;}
  .mini{font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);font-weight:800;cursor:pointer;}
  .mini:active{transform:scale(.93);}

  /* ---- grade de jogos (console) ---- */
  #grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:18px 14px;align-content:start;-webkit-overflow-scrolling:touch;}
  .gcard{position:relative;border-radius:20px;padding:18px 12px;min-height:140px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;overflow:hidden;border:2px solid rgba(255,255,255,.12);box-shadow:0 8px 24px rgba(0,0,0,.4);transition:transform .1s;}
  .gcard:active{transform:scale(.95);}
  .gcard .ico{font-size:48px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.4));}
  .gcard .gn{font-weight:900;font-size:15px;text-align:center;text-shadow:0 2px 4px rgba(0,0,0,.5);}
  .gcard .gd{font-size:10px;opacity:.85;text-align:center;}
  .gcard .hi{position:absolute;top:8px;right:10px;font-size:10px;font-weight:900;color:#ffd700;}
  .c0{background:linear-gradient(160deg,#7c3aed,#4c1d95);}
  .c1{background:linear-gradient(160deg,#0ea5e9,#1e3a8a);}
  .c2{background:linear-gradient(160deg,#22c55e,#14532d);}
  .c3{background:linear-gradient(160deg,#f97316,#7c2d12);}
  .c4{background:linear-gradient(160deg,#ec4899,#831843);}
  .c5{background:linear-gradient(160deg,#eab308,#713f12);}

  /* ---- botoes topo direita ---- */
  #topbtns{position:absolute;top:calc(env(safe-area-inset-top,0px) + 10px);right:14px;z-index:6;display:flex;gap:8px;}
  .ib{width:40px;height:40px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;cursor:pointer;backdrop-filter:blur(4px);}
  .ib:active{transform:scale(.9);}

  /* ---- tela de jogo ---- */
  #playHead{display:flex;align-items:center;justify-content:space-between;padding:calc(env(safe-area-inset-top,0px)+8px) 12px 6px;z-index:6;}
  #playTitle{font-weight:900;font-size:15px;}
  #playScore{font-weight:900;font-size:15px;color:#ffd700;}
  #gameCanvas{position:absolute;inset:0;width:100%;height:100%;z-index:3;display:none;touch-action:none;}
  #gameUI{position:absolute;left:0;right:0;bottom:0;z-index:5;padding:0 14px calc(env(safe-area-inset-bottom,0px)+14px);}

  /* ---- overlay/modais ---- */
  #ov{position:absolute;inset:0;z-index:30;display:none;align-items:center;justify-content:center;background:rgba(8,8,24,.85);backdrop-filter:blur(6px);padding:20px;}
  .card{background:linear-gradient(160deg,rgba(45,30,85,.95),rgba(18,18,46,.95));border:2px solid rgba(168,85,247,.5);border-radius:24px;padding:26px 22px;box-shadow:0 0 40px rgba(168,85,247,.4);max-width:360px;width:100%;text-align:center;max-height:90%;overflow-y:auto;}
  .card h2{font-size:26px;font-weight:900;background:linear-gradient(90deg,#ffd700,#a855f7,#22c55e);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:10px;}
  .card p{color:#cdd;font-size:14px;line-height:1.5;margin-bottom:16px;}
  .big{font-size:50px;margin-bottom:6px;}
  .obtn{margin:5px;padding:13px 22px;border-radius:40px;border:none;font-size:16px;font-weight:900;color:#fff;cursor:pointer;background:linear-gradient(90deg,#7c3aed,#a855f7);box-shadow:0 0 18px rgba(168,85,247,.5);}
  .obtn.green{background:linear-gradient(90deg,#15803d,#22c55e);}
  .obtn.red{background:linear-gradient(90deg,#b91c1c,#ef4444);}
  .obtn.blue{background:linear-gradient(90deg,#1d4ed8,#3b82f6);}
  .obtn:active{transform:scale(.93);}
  .obtn.full{display:block;width:100%;margin:8px 0;}

  /* perfil setup */
  .avgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:14px 0;}
  .avopt{aspect-ratio:1;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;border:2px solid transparent;}
  .avopt.sel{border-color:#ffd700;box-shadow:0 0 14px rgba(255,215,0,.5);}
  .nin{width:100%;padding:13px;border-radius:14px;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-size:17px;font-weight:800;text-align:center;outline:none;}
  .nin::placeholder{color:#889;}

  /* placar */
  .lbrow{display:flex;align-items:center;gap:10px;padding:10px;border-radius:14px;background:rgba(255,255,255,.06);margin-bottom:8px;}
  .lbrow .pos{font-weight:900;font-size:18px;width:28px;}
  .lbrow .nm{flex:1;font-weight:800;text-align:left;}
  .lbrow .sc{font-weight:900;color:#ffd700;}

  .float{position:absolute;font-weight:900;font-size:22px;pointer-events:none;animation:fu 1s ease-out forwards;z-index:20;}
  @keyframes fu{0%{opacity:1;transform:translateY(0) scale(.7);}30%{transform:translateY(-8px) scale(1.2);}100%{opacity:0;transform:translateY(-60px);}}
  .hint{font-size:12px;color:#9bb;text-align:center;margin-top:8px;}
</style>
</head>
<body>
<div id="app">
  <canvas id="bg"></canvas>

  <!-- HOME -->
  <div class="screen on" id="scHome">
    <div class="pad">
      <div class="brand"><div class="t1">LISBOA SOLUTIONS</div><div class="t2">BENJAX ARCADE</div></div>
      <div id="pbar">
        <div class="avatar" id="pav">🦊</div>
        <div><div id="pname">Jogador</div><div id="pcoins">0 B$</div></div>
        <div class="mini" id="switchBtn">trocar</div>
      </div>
    </div>
    <div id="grid"></div>
  </div>

  <!-- PLAY -->
  <div class="screen" id="scPlay">
    <div id="playHead">
      <div class="mini" id="backBtn">‹ Voltar</div>
      <div id="playTitle">Jogo</div>
      <div id="playScore">0</div>
    </div>
    <div id="gameUI"></div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="topbtns">
    <div class="ib" id="lbBtn">🏆</div>
    <div class="ib" id="sndBtn">🔊</div>
  </div>

  <div id="ov"><div class="card" id="ovCard"></div></div>
</div>

<script>
"use strict";
/* =========================================================
   BENJAX ARCADE — hub de minijogos (estado em memória)
   ========================================================= */

/* ---------- estado global ---------- */
var Players = [];          // [{name, av, color, coins, scores:{gameId:hi}}]
var current = 0;           // índice do jogador ativo
var soundOn = true;
var AVATARS = ['🦊','🐲','🦖','🐱','🦁','🐼','🐸','🤖','👽','🦄'];
var AV_COLORS = ['#f97316','#22c55e','#ef4444','#a855f7','#eab308','#3b82f6','#14b8a6','#64748b','#84cc16','#ec4899'];

function P(){ return Players[current]; }

/* ---------- canvas refs ---------- */
var bgC=document.getElementById('bg'), bx=bgC.getContext('2d');
var gC=document.getElementById('gameCanvas'), gx=gC.getContext('2d');
var W,H,DPR;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  var r=document.getElementById('app').getBoundingClientRect();
  W=r.width;H=r.height;
  [bgC,gC].forEach(function(c){c.width=W*DPR;c.height=H*DPR;});
  bx.setTransform(DPR,0,0,DPR,0,0); gx.setTransform(DPR,0,0,DPR,0,0);
  buildStars();
}
window.addEventListener('resize',resize);

/* ---------- fundo animado ---------- */
var stars=[],neb=[];
function buildStars(){stars=[];for(var i=0;i<80;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.6+.3,t:Math.random()*6.3,sp:Math.random()*2+.5});neb=[{x:W*.2,y:H*.2,r:W*.6,c:'rgba(120,40,180,.16)'},{x:W*.85,y:H*.5,r:W*.5,c:'rgba(40,90,200,.14)'},{x:W*.5,y:H*.85,r:W*.6,c:'rgba(30,160,120,.1)'}];}
function drawBG(t){bx.clearRect(0,0,W,H);bx.fillStyle='#0a0a1a';bx.fillRect(0,0,W,H);for(var n=0;n<neb.length;n++){var b=neb[n];var g=bx.createRadialGradient(b.x,b.y,0,b.x,b.y,b.r);g.addColorStop(0,b.c);g.addColorStop(1,'transparent');bx.fillStyle=g;bx.fillRect(0,0,W,H);}for(var i=0;i<stars.length;i++){var s=stars[i];bx.globalAlpha=.4+.6*Math.abs(Math.sin(t*.001*s.sp+s.t));bx.fillStyle='#fff';bx.beginPath();bx.arc(s.x,s.y,s.r,0,6.3);bx.fill();}bx.globalAlpha=1;}

/* ---------- audio ---------- */
var AC=null;
function actx(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(AC&&AC.state==='suspended')AC.resume();return AC;}
function tone(f,d,type,v,when){if(!soundOn)return;var a=actx();if(!a)return;var o=a.createOscillator(),g=a.createGain();o.type=type||'sine';o.frequency.value=f;var ts=a.currentTime+(when||0);g.gain.setValueAtTime(v||.2,ts);g.gain.exponentialRampToValueAtTime(.001,ts+d);o.connect(g);g.connect(a.destination);o.start(ts);o.stop(ts+d);}
var SFX={
  tap:function(){tone(600,.06,'square',.15);},
  good:function(){[523,659,784].forEach(function(f,i){tone(f,.14,'triangle',.18,i*.05);});},
  bad:function(){var a=actx();if(!a||!soundOn)return;var o=a.createOscillator(),g=a.createGain();o.type='sawtooth';o.frequency.setValueAtTime(300,a.currentTime);o.frequency.exponentialRampToValueAtTime(90,a.currentTime+.35);g.gain.setValueAtTime(.2,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.37);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+.37);},
  coin:function(){tone(988,.07,'square',.16);tone(1319,.1,'square',.16,.05);},
  pop:function(){var a=actx();if(!a||!soundOn)return;var o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.setValueAtTime(700,a.currentTime);o.frequency.exponentialRampToValueAtTime(180,a.currentTime+.1);g.gain.setValueAtTime(.25,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.12);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+.12);},
  win:function(){[392,523,659,784,1047,1319].forEach(function(f,i){tone(f,.2,'triangle',.2,i*.09);});},
  jump:function(){tone(440,.1,'square',.14);tone(660,.08,'square',.12,.05);}
};

/* ---------- partículas compartilhadas ---------- */
var parts=[];
function burst(x,y,color,n){n=n||16;for(var i=0;i<n;i++){var a=Math.random()*6.3,s=Math.random()*4+1.5;parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,c:color,r:Math.random()*4+2});}}
function stepParts(){for(var i=parts.length-1;i>=0;i--){var p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life-=.03;if(p.life<=0){parts.splice(i,1);continue;}gx.globalAlpha=p.life;gx.fillStyle=p.c;gx.beginPath();gx.arc(p.x,p.y,p.r,0,6.3);gx.fill();gx.globalAlpha=1;}}
function confetti(){for(var i=0;i<70;i++)parts.push({x:Math.random()*W,y:-10,vx:(Math.random()-.5)*4,vy:Math.random()*3+2,life:1.6,c:['#a855f7','#22c55e','#f97316','#ec4899','#eab308'][i%5],r:Math.random()*5+2});}

/* ---------- helpers UI ---------- */
function show(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');});document.getElementById(id).classList.add('on');}
function ov(html){document.getElementById('ovCard').innerHTML=html;document.getElementById('ov').style.display='flex';}
function ovClose(){document.getElementById('ov').style.display='none';}
function floatTxt(x,y,txt,color){var el=document.createElement('div');el.className='float';el.textContent=txt;el.style.color=color||'#ffd700';el.style.left=x+'px';el.style.top=y+'px';document.getElementById('app').appendChild(el);setTimeout(function(){el.remove();},1000);}
function updatePBar(){var p=P();if(!p)return;document.getElementById('pav').textContent=p.av;document.getElementById('pav').style.background=p.color;document.getElementById('pname').textContent=p.name;document.getElementById('pcoins').textContent=p.coins+' B$';}

/* =========================================================
   CATÁLOGO DE JOGOS
   ========================================================= */
var GAMES=[
  {id:'tap',  name:'Tap Rush',     d:'Toque rápido!',     ico:'⚡', c:'c0'},
  {id:'jump', name:'Sky Hopper',   d:'Pule os blocos',    ico:'🦘', c:'c1'},
  {id:'pop',  name:'Bubble Pop',   d:'Estoure tudo',      ico:'🫧', c:'c2'},
  {id:'dodge',name:'Esquiva',      d:'Desvie dos meteoros',ico:'☄️', c:'c3'},
  {id:'memo', name:'Memória',      d:'Ache os pares',     ico:'🧠', c:'c4'},
  {id:'catch',name:'Chuva de B$',  d:'Pegue as moedas',   ico:'💰', c:'c5'}
];
function buildGrid(){
  var g=document.getElementById('grid');g.innerHTML='';
  GAMES.forEach(function(gm){
    var hi=(P()&&P().scores[gm.id])||0;
    var d=document.createElement('div');
    d.className='gcard '+gm.c;
    d.innerHTML='<div class="hi">'+(hi?'★ '+hi:'')+'</div><div class="ico">'+gm.ico+'</div><div class="gn">'+gm.name+'</div><div class="gd">'+gm.d+'</div>';
    d.onclick=function(){SFX.tap();startGame(gm);};
    g.appendChild(d);
  });
}

/* =========================================================
   MOTOR DE JOGO (genérico)
   ========================================================= */
var Game={active:false,id:null,score:0,raf:null,obj:null,touch:null};
function setScore(s){Game.score=s;document.getElementById('playScore').textContent=s;}
function endGame(won){
  Game.active=false;
  if(Game.raf)cancelAnimationFrame(Game.raf);
  gC.style.display='none';
  document.getElementById('gameUI').innerHTML='';
  // recompensa
  var earned=Math.max(1,Math.round(Game.score/2));
  P().coins+=earned;
  var prevHi=P().scores[Game.id]||0;
  var record=Game.score>prevHi;
  if(record)P().scores[Game.id]=Game.score;
  updatePBar();
  SFX.win();confetti();
  ov('<div class="big">'+(record?'🏆':'🎮')+'</div><h2>'+(record?'NOVO RECORDE!':'Fim de jogo')+'</h2>'+
     '<p>Pontuação: <b style="color:#fff">'+Game.score+'</b><br>Ganhou: <b style="color:#ffd700">+'+earned+' B$</b></p>'+
     '<button class="obtn green full" id="againB">Jogar de novo ↺</button>'+
     '<button class="obtn blue full" id="homeB">Menu de jogos</button>');
  document.getElementById('againB').onclick=function(){ovClose();startGame(GAMES.filter(function(x){return x.id===Game.id;})[0]);};
  document.getElementById('homeB').onclick=function(){ovClose();show('scHome');buildGrid();updatePBar();};
}
function startGame(gm){
  actx();
  Game.id=gm.id;Game.active=true;setScore(0);
  show('scPlay');
  document.getElementById('playTitle').textContent=gm.ico+' '+gm.name;
  gC.style.display='block';
  document.getElementById('gameUI').innerHTML='';
  GAME_INIT[gm.id]();
}

/* input unificado */
function canvasXY(e){var r=gC.getBoundingClientRect();var t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}

/* ====== cada jogo define INIT que monta loop próprio ====== */
var GAME_INIT={};

/* ---------- 1) TAP RUSH: toque os alvos antes do tempo ---------- */
GAME_INIT.tap=function(){
  var targets=[],timeLeft=20,t0=performance.now(),spawnT=0;
  function spawn(){targets.push({x:30+Math.random()*(W-60),y:120+Math.random()*(H-260),r:34,life:1.4,col:['#a855f7','#22c55e','#f97316','#ec4899','#3b82f6'][Math.floor(Math.random()*5)]});}
  function onTap(e){if(!Game.active)return;var p=canvasXY(e);for(var i=targets.length-1;i>=0;i--){var tg=targets[i];if((p.x-tg.x)*(p.x-tg.x)+(p.y-tg.y)*(p.y-tg.y)<tg.r*tg.r){targets.splice(i,1);setScore(Game.score+1);burst(tg.x,tg.y,tg.col);SFX.pop();return;}}}
  gC.ontouchstart=onTap;gC.onmousedown=onTap;
  function loop(now){if(!Game.active)return;var dt=(now-t0)/1000;t0=now;timeLeft-=dt;spawnT-=dt;
    drawBG(now);gx.clearRect(0,0,W,H);
    if(spawnT<=0){spawn();spawnT=Math.max(.4,.9-Game.score*.02);}
    for(var i=targets.length-1;i>=0;i--){var tg=targets[i];tg.life-=dt;if(tg.life<=0){targets.splice(i,1);continue;}
      gx.save();gx.shadowColor=tg.col;gx.shadowBlur=18;var g=gx.createRadialGradient(tg.x-10,tg.y-10,4,tg.x,tg.y,tg.r);g.addColorStop(0,'#fff');g.addColorStop(.3,tg.col);g.addColorStop(1,tg.col);gx.fillStyle=g;gx.beginPath();gx.arc(tg.x,tg.y,tg.r,0,6.3);gx.fill();gx.restore();}
    stepParts();
    gx.fillStyle='#fff';gx.font='900 20px Segoe UI';gx.textAlign='center';gx.fillText('⏱ '+Math.max(0,timeLeft).toFixed(1)+'s',W/2,H-30);
    if(timeLeft<=0){endGame();return;}
    Game.raf=requestAnimationFrame(loop);}
  Game.raf=requestAnimationFrame(loop);
};

/* ---------- 2) SKY HOPPER: toque pra pular plataformas ---------- */
GAME_INIT.jump=function(){
  var py=H-160,vy=0,px=W/2,plats=[],scrollY=0,best=0;
  for(var i=0;i<8;i++)plats.push({x:Math.random()*(W-80)+10,y:H-120-i*90,w:70});
  plats[0].x=px-35;
  function jump(){if(!Game.active)return;vy=-13;SFX.jump();}
  gC.ontouchstart=function(e){e.preventDefault();jump();};gC.onmousedown=jump;
  // movimento horizontal por inclinação tátil: arrasta dedo
  gC.ontouchmove=function(e){e.preventDefault();var p=canvasXY(e);px=p.x;};
  function loop(now){if(!Game.active)return;drawBG(now);gx.clearRect(0,0,W,H);
    vy+=.6;py+=vy;
    // scroll quando sobe
    if(py<H*.4){var d=H*.4-py;py=H*.4;for(var i=0;i<plats.length;i++)plats[i].y+=d;best+=d;setScore(Math.floor(best/50));}
    // colisão
    for(var i=0;i<plats.length;i++){var pl=plats[i];if(vy>0&&px>pl.x-10&&px<pl.x+pl.w+10&&py>pl.y-8&&py<pl.y+10){vy=-13;SFX.jump();}}
    // recicla plataformas que saíram embaixo
    for(var i=0;i<plats.length;i++){if(plats[i].y>H){plats[i].y=-10;plats[i].x=Math.random()*(W-80)+10;}}
    // desenha plataformas
    for(var i=0;i<plats.length;i++){var pl=plats[i];gx.fillStyle='#22c55e';gx.shadowColor='#4ade80';gx.shadowBlur=10;gx.beginPath();gx.roundRect(pl.x,pl.y,pl.w,14,7);gx.fill();gx.shadowBlur=0;}
    // jogador (avatar)
    gx.font='34px Segoe UI';gx.textAlign='center';gx.fillText(P().av,px,py);
    stepParts();
    if(py>H+40){endGame();return;}
    Game.raf=requestAnimationFrame(loop);}
  Game.raf=requestAnimationFrame(loop);
  document.getElementById('gameUI').innerHTML='<div class="hint">Arraste pra mover • toque pra pular</div>';
};

/* ---------- 3) BUBBLE POP: estoure quantas puder ---------- */
GAME_INIT.pop=function(){
  var bub=[],timeLeft=25,t0=performance.now(),sp=0;
  function spawn(){var c=['#a855f7','#22c55e','#f97316','#ec4899','#3b82f6','#eab308'][Math.floor(Math.random()*6)];bub.push({x:30+Math.random()*(W-60),y:H+30,r:24+Math.random()*16,vy:-(1+Math.random()*1.5),col:c,wob:Math.random()*6.3});}
  function onTap(e){if(!Game.active)return;var p=canvasXY(e);for(var i=bub.length-1;i>=0;i--){var b=bub[i];if((p.x-b.x)*(p.x-b.x)+(p.y-b.y)*(p.y-b.y)<b.r*b.r){bub.splice(i,1);setScore(Game.score+1);burst(b.x,b.y,b.col);SFX.pop();return;}}}
  gC.ontouchstart=onTap;gC.onmousedown=onTap;
  function loop(now){if(!Game.active)return;var dt=(now-t0)/1000;t0=now;timeLeft-=dt;sp-=dt;
    drawBG(now);gx.clearRect(0,0,W,H);
    if(sp<=0){spawn();sp=.5;}
    for(var i=bub.length-1;i>=0;i--){var b=bub[i];b.y+=b.vy;b.x+=Math.sin(now*.002+b.wob)*.6;if(b.y<-40){bub.splice(i,1);continue;}
      gx.save();gx.shadowColor=b.col;gx.shadowBlur=16;var g=gx.createRadialGradient(b.x-b.r*.3,b.y-b.r*.3,b.r*.1,b.x,b.y,b.r);g.addColorStop(0,'#fff');g.addColorStop(.4,b.col);g.addColorStop(1,b.col);gx.fillStyle=g;gx.beginPath();gx.arc(b.x,b.y,b.r,0,6.3);gx.fill();gx.restore();}
    stepParts();
    gx.fillStyle='#fff';gx.font='900 20px Segoe UI';gx.textAlign='center';gx.fillText('⏱ '+Math.max(0,timeLeft).toFixed(1)+'s',W/2,H-30);
    if(timeLeft<=0){endGame();return;}
    Game.raf=requestAnimationFrame(loop);}
  Game.raf=requestAnimationFrame(loop);
};

/* ---------- 4) ESQUIVA: desvie dos meteoros ---------- */
GAME_INIT.dodge=function(){
  var px=W/2,py=H-120,rocks=[],t0=performance.now(),sp=0,surv=0;
  gC.ontouchstart=move;gC.ontouchmove=function(e){e.preventDefault();move(e);};gC.onmousedown=move;gC.onmousemove=function(e){if(e.buttons)move(e);};
  function move(e){if(e.preventDefault)e.preventDefault();var p=canvasXY(e);px=p.x;py=Math.min(H-60,Math.max(120,p.y));}
  function loop(now){if(!Game.active)return;var dt=(now-t0)/1000;t0=now;surv+=dt;sp-=dt;setScore(Math.floor(surv));
    drawBG(now);gx.clearRect(0,0,W,H);
    if(sp<=0){rocks.push({x:Math.random()*W,y:-20,r:16+Math.random()*14,vy:2+Math.random()*2+surv*.05,vx:(Math.random()-.5)*1.5});sp=Math.max(.25,.6-surv*.01);}
    for(var i=rocks.length-1;i>=0;i--){var r=rocks[i];r.y+=r.vy;r.x+=r.vx;if(r.y>H+30){rocks.splice(i,1);continue;}
      gx.fillStyle='#f97316';gx.shadowColor='#fdba74';gx.shadowBlur=12;gx.beginPath();gx.arc(r.x,r.y,r.r,0,6.3);gx.fill();gx.shadowBlur=0;
      if((px-r.x)*(px-r.x)+(py-r.y)*(py-r.y)<(r.r+18)*(r.r+18)){burst(px,py,'#ef4444',24);SFX.bad();endGame();return;}}
    // jogador
    gx.font='34px Segoe UI';gx.textAlign='center';gx.fillText(P().av,px,py);
    stepParts();
    Game.raf=requestAnimationFrame(loop);}
  Game.raf=requestAnimationFrame(loop);
  document.getElementById('gameUI').innerHTML='<div class="hint">Arraste pra desviar dos meteoros!</div>';
};

/* ---------- 5) MEMÓRIA: ache os pares ---------- */
GAME_INIT.memo=function(){
  gC.style.display='none';
  var icons=['🦊','🐲','🦖','🐱','🦁','🐼','🐸','🤖'];
  var deck=icons.concat(icons);
  for(var i=deck.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=deck[i];deck[i]=deck[j];deck[j]=t;}
  var flipped=[],matched=[],moves=0,canClick=true;
  var ui=document.getElementById('gameUI');
  ui.style.bottom='auto';ui.style.top='70px';ui.style.left='0';ui.style.right='0';
  function render(){
    var html='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:10px;">';
    for(var i=0;i<deck.length;i++){
      var faceUp=flipped.indexOf(i)>=0||matched.indexOf(i)>=0;
      var bg=matched.indexOf(i)>=0?'linear-gradient(160deg,#22c55e,#14532d)':'linear-gradient(160deg,#7c3aed,#4c1d95)';
      html+='<div data-i="'+i+'" class="mcard" style="aspect-ratio:1;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:34px;background:'+(faceUp?'rgba(255,255,255,.12)':bg)+';border:2px solid rgba(255,255,255,.15);cursor:pointer;">'+(faceUp?deck[i]:'❓')+'</div>';
    }
    html+='</div><div class="hint">Movimentos: '+moves+'</div>';
    ui.innerHTML=html;
    ui.querySelectorAll('.mcard').forEach(function(c){c.onclick=function(){click(parseInt(c.getAttribute('data-i')));};});
  }
  function click(i){
    if(!canClick||flipped.indexOf(i)>=0||matched.indexOf(i)>=0)return;
    SFX.tap();flipped.push(i);
    if(flipped.length===2){moves++;canClick=false;render();
      var a=flipped[0],b=flipped[1];
      if(deck[a]===deck[b]){matched.push(a,b);SFX.good();flipped=[];canClick=true;setScore(matched.length/2);
        if(matched.length===deck.length){setTimeout(function(){Game.id='memo';Game.score=Math.max(1,20-moves);endGame();},400);}
        else render();
      }else{SFX.bad();setTimeout(function(){flipped=[];canClick=true;render();},700);}
    }else render();
  }
  render();
  // restaura UI ao sair via endGame (reset feito em startGame)
};

/* ---------- 6) CHUVA DE B$: pegue as moedas ---------- */
GAME_INIT.catch=function(){
  var px=W/2,coins=[],bombs=[],t0=performance.now(),sp=0,timeLeft=30;
  gC.ontouchstart=move;gC.ontouchmove=function(e){e.preventDefault();move(e);};gC.onmousedown=move;gC.onmousemove=function(e){if(e.buttons)move(e);};
  function move(e){if(e.preventDefault)e.preventDefault();px=canvasXY(e).x;}
  function loop(now){if(!Game.active)return;var dt=(now-t0)/1000;t0=now;timeLeft-=dt;sp-=dt;
    drawBG(now);gx.clearRect(0,0,W,H);
    if(sp<=0){if(Math.random()<.8)coins.push({x:Math.random()*W,y:-20,vy:2.5+Math.random()*2});else bombs.push({x:Math.random()*W,y:-20,vy:3+Math.random()*2});sp=.5;}
    var py=H-90;
    for(var i=coins.length-1;i>=0;i--){var c=coins[i];c.y+=c.vy;if(c.y>H+20){coins.splice(i,1);continue;}
      gx.font='28px Segoe UI';gx.textAlign='center';gx.fillText('🪙',c.x,c.y);
      if(Math.abs(c.x-px)<34&&Math.abs(c.y-py)<34){coins.splice(i,1);setScore(Game.score+2);SFX.coin();burst(c.x,c.y,'#ffd700',10);}}
    for(var i=bombs.length-1;i>=0;i--){var b=bombs[i];b.y+=b.vy;if(b.y>H+20){bombs.splice(i,1);continue;}
      gx.font='28px Segoe UI';gx.fillText('💣',b.x,b.y);
      if(Math.abs(b.x-px)<32&&Math.abs(b.y-py)<32){SFX.bad();burst(px,py,'#ef4444',24);endGame();return;}}
    // cesta
    gx.font='40px Segoe UI';gx.textAlign='center';gx.fillText('🧺',px,py+10);
    stepParts();
    gx.fillStyle='#fff';gx.font='900 18px Segoe UI';gx.fillText('⏱ '+Math.max(0,timeLeft).toFixed(1)+'s',W/2,40);
    if(timeLeft<=0){endGame();return;}
    Game.raf=requestAnimationFrame(loop);}
  Game.raf=requestAnimationFrame(loop);
  document.getElementById('gameUI').innerHTML='<div class="hint">Pegue 🪙 e fuja das 💣</div>';
};

/* =========================================================
   PERFIS / TROCA DE JOGADOR (multiplayer local)
   ========================================================= */
var setupSel={av:0,name:''};
function profileSetup(first){
  var avs='';AVATARS.forEach(function(a,i){avs+='<div class="avopt'+(i===setupSel.av?' sel':'')+'" data-i="'+i+'" style="background:'+AV_COLORS[i]+'">'+a+'</div>';});
  ov('<h2>'+(first?'Quem vai jogar?':'Novo jogador')+'</h2>'+
     '<p>Escolha seu avatar e nome.<br><b>Cada amigo cria o seu</b> e disputa o placar!</p>'+
     '<div class="avgrid">'+avs+'</div>'+
     '<input class="nin" id="ninp" maxlength="10" placeholder="Seu nome">'+
     '<button class="obtn green full" id="createB">Começar a jogar ▶</button>'+
     (Players.length>0?'<button class="obtn blue full" id="cancelB">Cancelar</button>':''));
  document.querySelectorAll('.avopt').forEach(function(o){o.onclick=function(){setupSel.av=parseInt(o.getAttribute('data-i'));document.querySelectorAll('.avopt').forEach(function(x){x.classList.remove('sel');});o.classList.add('sel');SFX.tap();};});
  if(Players.length>0)document.getElementById('cancelB').onclick=function(){ovClose();};
  document.getElementById('createB').onclick=function(){
    var nm=document.getElementById('ninp').value.trim()||('Jogador'+(Players.length+1));
    Players.push({name:nm,av:AVATARS[setupSel.av],color:AV_COLORS[setupSel.av],coins:0,scores:{}});
    current=Players.length-1;setupSel={av:0,name:''};
    ovClose();updatePBar();buildGrid();show('scHome');SFX.good();
  };
}
function switchPlayer(){
  var rows='';Players.forEach(function(p,i){rows+='<div class="lbrow" data-i="'+i+'" style="cursor:pointer;'+(i===current?'border:2px solid #ffd700;':'')+'"><div class="avatar" style="background:'+p.color+';width:34px;height:34px;font-size:18px;">'+p.av+'</div><div class="nm">'+p.name+'</div><div class="sc">'+p.coins+' B$</div></div>';});
  ov('<h2>Jogadores</h2><p>Toque pra escolher quem joga agora.</p>'+rows+
     '<button class="obtn green full" id="addB">+ Novo jogador</button>'+
     '<button class="obtn blue full" id="closeB">Fechar</button>');
  document.querySelectorAll('.lbrow').forEach(function(r){r.onclick=function(){current=parseInt(r.getAttribute('data-i'));ovClose();updatePBar();buildGrid();SFX.tap();};});
  document.getElementById('addB').onclick=function(){profileSetup(false);};
  document.getElementById('closeB').onclick=ovClose;
}

/* =========================================================
   PLACAR (leaderboard local entre amigos)
   ========================================================= */
function leaderboard(){
  // ranking por total de B$ + melhor pontuação somada
  var rank=Players.map(function(p){var tot=0;for(var k in p.scores)tot+=p.scores[k];return{p:p,coins:p.coins,best:tot};}).sort(function(a,b){return (b.coins+b.best)-(a.coins+a.best);});
  var medals=['🥇','🥈','🥉'];
  var rows='';
  if(rank.length===0)rows='<p>Ainda não há jogadores.</p>';
  rank.forEach(function(e,i){rows+='<div class="lbrow"><div class="pos">'+(medals[i]||(i+1))+'</div><div class="avatar" style="background:'+e.p.color+';width:32px;height:32px;font-size:17px;">'+e.p.av+'</div><div class="nm">'+e.p.name+'</div><div class="sc">'+(e.coins)+' B$</div></div>';});
  ov('<div class="big">🏆</div><h2>Placar dos Amigos</h2>'+rows+'<button class="obtn blue full" id="lbClose">Fechar</button>');
  document.getElementById('lbClose').onclick=ovClose;
}

/* =========================================================
   BOTÕES & INIT
   ========================================================= */
document.getElementById('switchBtn').onclick=function(){SFX.tap();switchPlayer();};
document.getElementById('lbBtn').onclick=function(){SFX.tap();leaderboard();};
document.getElementById('sndBtn').onclick=function(){soundOn=!soundOn;document.getElementById('sndBtn').textContent=soundOn?'🔊':'🔇';if(soundOn){actx();SFX.tap();}};
document.getElementById('backBtn').onclick=function(){
  if(Game.active){ov('<h2>Sair do jogo?</h2><p>Você perde a pontuação atual.</p><button class="obtn red full" id="yB">Sair</button><button class="obtn blue full" id="nB">Continuar jogando</button>');
    document.getElementById('yB').onclick=function(){Game.active=false;if(Game.raf)cancelAnimationFrame(Game.raf);gC.style.display='none';document.getElementById('gameUI').innerHTML='';ovClose();show('scHome');buildGrid();updatePBar();
      // restaura UI do gameUI (memo mexe nele)
      var ui=document.getElementById('gameUI');ui.style.bottom='';ui.style.top='';};
    document.getElementById('nB').onclick=ovClose;
  } else {show('scHome');}
};

resize();
document.body.addEventListener('touchstart',function(){actx();},{once:true});
profileSetup(true);   // primeiro jogador
(function bgloop(t){drawBG(t);requestAnimationFrame(bgloop);})(0);

/* service worker */
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
